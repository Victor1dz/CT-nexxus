<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Histórico de Frequência - CT Nexxus')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('diario')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 fw-bold mb-0"><i class="bi bi-clock-history"></i> Histórico de Frequência</h1>
                <p class="text-muted mb-0" th:text="${'Visualizando presença do aluno: ' + aluno.nome}"></p>
            </div>

            <div>
                <a th:href="@{/diario}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar ao Diário
                </a>
            </div>
        </div>

        <div class="card mb-4 border-0 shadow-sm mt-4">
            <div class="card-header bg-white py-3 border-bottom-0">
                <h5 class="card-title fw-bold text-info mb-0">
                    <i class="bi bi-card-list"></i> Presenças e Faltas Resgistradas
                </h5>
            </div>
            <div class="card-body p-0">
                <!-- Estatísticas do Mês Atual -->
                <div class="px-4 pt-3 pb-2 bg-light border-bottom d-flex align-items-center flex-wrap gap-3"
                    th:if="${historicoPresencas != null}">
                    <div class="d-flex flex-column">
                        <span class="text-uppercase small fw-bold text-secondary">Frequência (Mês Atual)</span>
                        <span class="fs-4 fw-bold text-primary">
                            <span th:text="${presencasMes}"></span>/<span th:text="${totalMes}"></span> Aulas
                        </span>
                    </div>
                    <div class="d-flex flex-column border-start ps-3 border-dark border-opacity-25">
                        <span class="text-uppercase small fw-bold text-secondary">Aproveitamento</span>
                        <span class="fs-4 fw-bold"
                            th:classappend="${porcentagemMes >= 70 ? 'text-success' : 'text-danger'}">
                            <span th:text="${porcentagemMes}"></span>%
                        </span>
                    </div>
                    <div class="d-flex flex-column border-start ps-3 border-dark border-opacity-25">
                        <span class="text-uppercase small fw-bold text-secondary">Ausências</span>
                        <span class="fs-4 fw-bold text-danger">
                            <span th:text="${faltasMes}"></span>
                        </span>
                    </div>
                </div>

                <div class="table-responsive" th:if="${not #lists.isEmpty(historicoPresencas)}">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Data</th>
                                <th>Status</th>
                                <th>Observação / Motivo</th>
                                <th class="text-end pe-4">Modalidade</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${historicoPresencas}">
                                <td class="ps-4 fw-bold text-secondary">
                                    <span th:if="${p.data != null}"
                                        th:text="${#temporals.format(p.data, 'dd/MM/yyyy')}"></span>
                                    <span th:if="${p.data == null}" class="text-muted">Data Indisponível</span>
                                </td>
                                <td>
                                    <span th:if="${p.presente}" class="badge bg-success"><i
                                            class="bi bi-check-circle"></i>
                                        Presente</span>
                                    <span th:if="${!p.presente}" class="badge bg-danger"><i class="bi bi-x-circle"></i>
                                        Falta</span>
                                </td>
                                <td>
                                    <!-- Botões -->
                                    <button class="btn btn-sm btn-link text-decoration-none p-0" type="button"
                                        data-bs-toggle="collapse" th:data-bs-target="'#obs' + ${p.id}"
                                        th:if="${p.observacao == null or p.observacao.isBlank()}">
                                        <small><i class="bi bi-plus-circle"></i> Adicionar Obs.</small>
                                    </button>
                                    <button class="btn btn-sm btn-outline-secondary p-1 py-0 shadow-sm" type="button"
                                        data-bs-toggle="collapse" th:data-bs-target="'#obs' + ${p.id}"
                                        th:if="${p.observacao != null and !p.observacao.isBlank()}"
                                        title="Ver Observação">
                                        <i class="bi bi-eye"></i> Visualizar Obs.
                                    </button>

                                    <!-- Collapse Form -->
                                    <div class="collapse mt-2" th:id="'obs' + ${p.id}">
                                        <div th:if="${p.observacao != null and !p.observacao.isBlank()}"
                                            class="mb-2 p-2 bg-light border border-info rounded text-dark small">
                                            <i class="bi bi-chat-text text-info"></i> <strong
                                                th:text="${p.observacao}"></strong>
                                        </div>
                                        <form th:action="@{/alunos/presenca/{pid}/observacao(pid=${p.id})}"
                                            method="post" class="d-flex align-items-center">
                                            <input type="hidden" name="alunoId" th:value="${aluno.id}">
                                            <input type="hidden" name="origem" value="diario">
                                            <input type="text" name="observacao"
                                                class="form-control form-control-sm me-1"
                                                placeholder="Sua observação..." th:value="${p.observacao}"
                                                style="max-width: 250px;">
                                            <button type="submit" class="btn btn-sm btn-primary"><i
                                                    class="bi bi-check"></i></button>
                                        </form>
                                    </div>
                                </td>
                                <td class="text-end pe-4 text-muted small fw-bold"
                                    th:text="${p.matricula != null and p.matricula.modalidade != null ? p.matricula.modalidade.nome : '-'}">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(historicoPresencas)}" class="p-4 text-center text-muted">
                    <i class="bi bi-calendar-x d-block fs-2 mb-2 opacity-50"></i>
                    Nenhum registro de presença para exibir.
                </div>
            </div>
        </div>

    </main>

    <div th:replace="~{layout :: scripts}"></div>

    <!-- SweetAlert para mensagens Flash -->
    <script th:if="${success}" th:inline="javascript">
        Swal.fire({
            icon: 'success',
            title: 'Sucesso!',
            text: /*[[${success}]]*/ 'Ação realizada.',
            showConfirmButton: false,
            timer: 2000
        });
    </script>
</body>

</html>
