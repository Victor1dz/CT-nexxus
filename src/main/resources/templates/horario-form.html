<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Horário - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">Horário</h1>

<form th:action="@{/horarios/salvar}" th:object="${horario}" method="post">

  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label>Dia da semana</label>
    <select class="form-select" th:field="*{diaSemana}" required>
      <option value="">Selecione</option>
      <option th:each="d : ${diasSemana}" th:value="${d}" th:text="${d}"></option>
    </select>
  </div>

  <div class="row">
    <div class="col-6 mb-3">
      <label>Hora início</label>
      <input class="form-control" type="time" th:field="*{horaInicio}" required>
    </div>
    <div class="col-6 mb-3">
      <label>Hora fim</label>
      <input class="form-control" type="time" th:field="*{horaFim}" required>
    </div>
  </div>

  <div class="mb-3">
    <label>Modalidade</label>
    <select class="form-select" th:field="*{modalidade}" required>
      <option value="">Selecione</option>
      <option th:each="m : ${modalidades}" th:value="${m.id}" th:text="${m.nome}"></option>
    </select>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" th:field="*{ativo}">
    <label class="form-check-label">Ativo</label>
  </div>

  <button class="btn btn-success">Salvar</button>
  <a href="/horarios" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
