<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Novo Horário - CT Nexxus')}"></head>

<body>

  <div th:replace="~{layout :: sidebar('horarios')}"></div>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-bold mb-0">Configurar Horário</h1>
      <a href="/horarios" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <div class="card p-4 col-md-8 mx-auto">
      <form th:action="@{/horarios/salvar}" th:object="${horario}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
          <label class="form-label fw-bold">Modalidade</label>
          <select class="form-select" th:field="*{modalidade}" required>
            <option value="">Selecione a modalidade</option>
            <option th:each="m : ${modalidades}" th:value="${m.id}" th:text="${m.nome}"></option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold d-block">Dias da Semana</label>
          <div class="btn-group" role="group" aria-label="Dias">
            <th:block th:each="dia : ${diasOpcoes}">
              <input type="checkbox" class="btn-check" th:id="${dia}" name="diasSemana" th:value="${dia}"
                th:checked="${diasSelecionados != null && diasSelecionados.contains(dia)}" autocomplete="off">
              <label class="btn btn-outline-primary" th:for="${dia}" th:text="${#strings.substring(dia,0,3)}"></label>
            </th:block>
          </div>
          <div class="form-text">Selecione todos os dias que aplicam a este horário.</div>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="checkFlexivel" onchange="toggleHorarioFlexivel()">
          <label class="form-check-label fw-bold text-primary" for="checkFlexivel">
            Horário Flexível / A Combinar (Sem horário fixo)
          </label>
        </div>

        <div class="row mb-3" id="divHoras">
          <div class="col-6">
            <label class="form-label fw-bold">Hora Início</label>
            <input class="form-control" type="time" th:field="*{horaInicio}" id="horaInicio">
          </div>
          <div class="col-6">
            <label class="form-label fw-bold">Hora Fim</label>
            <input class="form-control" type="time" th:field="*{horaFim}" id="horaFim">
          </div>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" th:field="*{ativo}">
          <label class="form-check-label">Horário Ativo e disponível para matrículas</label>
        </div>

        <div class="d-grid">
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-save"></i> Salvar Horário
          </button>
        </div>
      </form>
    </div>
  </main>

  <div th:replace="~{layout :: scripts}"></div>

  <script>
    function toggleHorarioFlexivel() {
      var isFlex = document.getElementById('checkFlexivel').checked;
      var div = document.getElementById('divHoras');
      var inputIn = document.getElementById('horaInicio');
      var inputFim = document.getElementById('horaFim');

      if (isFlex) {
        div.style.display = 'none';
        inputIn.value = '';
        inputFim.value = '';
        inputIn.removeAttribute('required');
        inputFim.removeAttribute('required');
      } else {
        div.style.display = 'flex';
        inputIn.setAttribute('required', 'required');
        inputFim.setAttribute('required', 'required');
      }
    }

    // Inicializa estado ao carregar (edição)
    document.addEventListener("DOMContentLoaded", function () {
      var inputIn = document.getElementById('horaInicio').value;
      if (!inputIn) {
        document.getElementById('checkFlexivel').checked = true;
        toggleHorarioFlexivel();
      }
    });
  </script>

</body>

</html>
