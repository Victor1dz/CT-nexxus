<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financeiro - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">💳 Financeiro</h1>

<form method="get" action="/financeiro" class="mb-3">
  <label class="form-label">Mês (YYYY-MM)</label>
  <div class="d-flex flex-wrap gap-2">
    <input class="form-control" type="month" name="mes" th:value="${mes}" style="max-width: 260px;">
    <button class="btn btn-primary" type="submit">Carregar</button>
    <a class="btn btn-outline-secondary" href="/inadimplencia">Ver inadimplência</a>
    <a class="btn btn-outline-info" href="/email-teste">Testar e-mail</a>
    <a class="btn btn-secondary" href="/dashboard">Voltar</a>
  </div>
</form>

<div class="table-responsive">
  <table class="table table-striped align-middle">
    <thead>
    <tr>
      <th>Aluno</th>
      <th>Competência</th>
      <th>Vencimento</th>
      <th>Valor</th>
      <th>Status</th>
      <th>Ação</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${mensalidades}">
      <td th:text="${m.aluno != null ? m.aluno.nome : '-'}"></td>
      <td th:text="${m.competencia}"></td>
      <td th:text="${m.vencimento}"></td>
      <td th:text="${'R$ ' + m.valor}"></td>

      <td>
        <span th:if="${m.status.name() == 'PAGO'}" class="badge text-bg-success">PAGO</span>
        <span th:if="${m.status.name() == 'PENDENTE' and m.vencimento != null and m.vencimento.isBefore(hoje)}" class="badge text-bg-danger">ATRASADO</span>
        <span th:if="${m.status.name() == 'PENDENTE' and (m.vencimento == null or !m.vencimento.isBefore(hoje))}" class="badge text-bg-warning">PENDENTE</span>
      </td>

      <td>
        <div class="d-flex flex-wrap gap-2 align-items-center">

          <form method="post" action="/financeiro/pagar" class="d-flex flex-wrap gap-2 align-items-center">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${m.id}">
            <input type="hidden" name="mes" th:value="${mes}">

            <select class="form-select form-select-sm" name="forma" required style="max-width: 160px;">
              <option value="">Forma de pagamento</option>
              <option value="PIX">PIX</option>
              <option value="CARTAO">CARTÃO</option>
              <option value="DINHEIRO">DINHEIRO</option>
            </select>

            <button class="btn btn-sm btn-success" type="submit">Marcar pago</button>
          </form>

          <form method="post" action="/financeiro/pendente">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="id" th:value="${m.id}">
            <input type="hidden" name="mes" th:value="${mes}">
            <button class="btn btn-sm btn-outline-secondary" type="submit">Voltar pendente</button>
          </form>

        </div>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
