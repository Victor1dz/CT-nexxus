<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">CT Nexxus</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        :root {
            /* Clean Light Theme Palette */
            --primary-color: #2c3e50;
            /* Dark Slate Blue - Professional */
            --accent-color: #3498db;
            /* Soft Blue */
            --bg-body: #f4f6f9;
            /* Light Gray - More depth */
            --sidebar-bg: #ffffff;
            --sidebar-text: #2c3e50;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #6c757d;
            --border-color: #e9ecef;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar Clean */
        .sidebar {
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            padding-top: 1.5rem;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
        }

        .sidebar-brand {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .sidebar-brand img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: contain;
            padding: 5px;
            background: #f8f9fa;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .sidebar-brand h5 {
            margin: 0;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .nav-link {
            color: var(--text-secondary);
            padding: 0.9rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            font-weight: 500;
            border-right: 3px solid transparent;
            margin-bottom: 5px;
        }

        .nav-link:hover {
            color: var(--accent-color);
            background-color: #f1f3f5;
            padding-left: 2rem;
            /* Micro-interaction slide */
        }

        .nav-link.active {
            color: var(--primary-color);
            background-color: #e9ecef;
            border-right-color: var(--primary-color);
            font-weight: 600;
        }

        .nav-link i {
            font-size: 1.2rem;
            opacity: 0.8;
            transition: transform 0.2s;
        }

        .nav-link:hover i {
            transform: scale(1.1);
        }

        .nav-link.active i {
            opacity: 1;
            color: var(--accent-color);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 2.5rem;
            min-height: 100vh;
        }

        /* Clean Cards with Premium Shadow */
        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            /* Bouncy effect */
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
            /* Deep shadow on hover */
        }

        .card-header {
            background-color: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
        }

        .card-title {
            color: var(--primary-color);
            font-weight: 700;
        }

        /* Stats Card Specific */
        .stats-icon {
            transition: transform 0.3s;
        }

        .card:hover .stats-icon {
            transform: rotate(10deg) scale(1.1);
        }

        /* Buttons & Forms */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color), #2980b9);
            border: none;
            padding: 0.7rem 1.5rem;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.4);
            background: linear-gradient(135deg, #2980b9, var(--accent-color));
        }

        .btn-outline-secondary {
            border-width: 2px;
            font-weight: 500;
        }

        .form-control,
        .form-select {
            border-color: #dee2e6;
            padding: 0.8rem;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            /* Lift input on focus */
        }
    </style>
</head>

<body>

    <div th:fragment="sidebar(activePage)">
        <nav class="sidebar">
            <a href="/" class="sidebar-brand">
                <img src="/img/logo.svg" alt="CT Nexxus Logo">
                <h5>CT Nexxus</h5>
            </a>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" href="/">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'alunos'} ? 'active'" href="/alunos">
                        <i class="bi bi-people"></i> Alunos
                    </a>
                </li>
                <li class="nav-item">

                    <a class="nav-link" th:classappend="${activePage == 'modalidades'} ? 'active'" href="/modalidades">
                        <i class="bi bi-gem"></i> Modalidades
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'horarios'} ? 'active'" href="/horarios">
                        <i class="bi bi-clock"></i> Horários
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'agenda'} ? 'active'" href="/agenda">
                        <i class="bi bi-calendar-week"></i> Agenda
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'diario'} ? 'active'" href="/diario">
                        <i class="bi bi-card-checklist"></i> Diário / Presença
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'financeiro'} ? 'active'" href="/financeiro">
                        <i class="bi bi-cash-coin"></i> Financeiro
                    </a>
                </li>
            </ul>

            <div class="mt-auto p-3 text-center" style="position: absolute; bottom: 0; width: 100%;">
                <small class="text-secondary">CT Nexxus v1.0</small>
            </div>
        </nav>
    </div>

    <div th:fragment="scripts">
        <!-- jQuery (Required for Masks and AJAX) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- SweetAlert2 -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', function () {
                /*<![CDATA[*/
                const successMsg = /*[[${success}]]*/ null;
                const errorMsg = /*[[${error}]]*/ null;

                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true,
                    didOpen: (toast) => {
                        toast.addEventListener('mouseenter', Swal.stopTimer)
                        toast.addEventListener('mouseleave', Swal.resumeTimer)
                    }
                });

                if (successMsg) {
                    Toast.fire({
                        icon: 'success',
                        title: successMsg
                    });
                }

                if (errorMsg) {
                    Toast.fire({
                        icon: 'error',
                        title: errorMsg
                    });
                }
                /*]]>*/
            });
        </script>
    </div>

</body>

</html>
