<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Anamnese - CT Nexxus')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('alunos')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 fw-bold mb-0">Ficha de Anamnese</h1>
                <p class="text-muted mb-0" th:text="${'Aluno: ' + aluno.nome}"></p>
            </div>
            <div>
                <a th:href="@{/fichas/aluno/{id}(id=${aluno.id})}" class="btn btn-warning fw-bold text-dark me-2">
                    <i class="bi bi-card-checklist"></i> Prescrever Treino (Ficha)
                </a>
                <a href="/alunos" class="btn btn-outline-secondary">Voltar</a>
            </div>
        </div>

        <form th:action="@{/anamneses/salvar}" th:object="${anamnese}" method="post">
            <!-- ID Oculto -->
            <input type="hidden" th:field="*{id}" />
            <!-- Aluno ID Oculto -->
            <input type="hidden" th:field="*{aluno.id}" />



            <!-- Card 0: Métricas Corporais -->
            <div class="card mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 fw-bold text-dark"><i class="bi bi-speedometer"></i> Métricas Corporais
                    </h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Peso (kg)</label>
                            <input type="number" step="0.1" class="form-control" th:field="*{peso}"
                                placeholder="Ex: 80.5">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Altura (m)</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{altura}"
                                placeholder="Ex: 1.75">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card 1: Saúde Geral -->
            <div class="card mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 fw-bold text-primary"><i class="bi bi-heart-pulse"></i> Saúde Geral</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <!-- Problema Cardíaco -->
                        <div class="col-md-6">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" id="cardiaco"
                                    th:field="*{possuiProblemaCardiaco}">
                                <label class="form-check-label fw-bold" for="cardiaco">Possui problema cardíaco?</label>
                            </div>
                            <input type="text" class="form-control form-control-sm" placeholder="Qual?"
                                th:field="*{detalheProblemaCardiaco}">
                        </div>

                        <!-- Problema Respiratório -->
                        <div class="col-md-6">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" id="respiratorio"
                                    th:field="*{possuiProblemaRespiratorio}">
                                <label class="form-check-label fw-bold" for="respiratorio">Possui problema
                                    respiratório?</label>
                            </div>
                            <input type="text" class="form-control form-control-sm" placeholder="Qual?"
                                th:field="*{detalheProblemaRespiratorio}">
                        </div>

                        <!-- Medicamentos -->
                        <div class="col-md-6">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" id="remedios"
                                    th:field="*{tomaMedicamentoContinuo}">
                                <label class="form-check-label fw-bold" for="remedios">Toma medicamento
                                    contínuo?</label>
                            </div>
                            <input type="text" class="form-control form-control-sm" placeholder="Quais?"
                                th:field="*{quaisMedicamentos}">
                        </div>

                        <!-- Alergias -->
                        <div class="col-md-6">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" id="alergia"
                                    th:field="*{possuiAlergia}">
                                <label class="form-check-label fw-bold" for="alergia">Possui alguma alergia?</label>
                            </div>
                            <input type="text" class="form-control form-control-sm" placeholder="A que?"
                                th:field="*{quaisAlergias}">
                        </div>

                        <!-- Cirurgias -->
                        <div class="col-12">
                            <div class="form-check form-switch mb-2">
                                <input class="form-check-input" type="checkbox" id="cirurgia"
                                    th:field="*{fezCirurgiaRecente}">
                                <label class="form-check-label fw-bold" for="cirurgia">Fez cirurgia
                                    recentemente?</label>
                            </div>
                            <input type="text" class="form-control form-control-sm" placeholder="Qual e quando?"
                                th:field="*{quaisCirurgias}">
                        </div>

                    </div>
                </div>
            </div>

            <!-- Card 2: Objetivos e Hábitos -->
            <div class="card mb-4">
                <div class="card-header bg-white py-3">
                    <h5 class="card-title mb-0 fw-bold text-success"><i class="bi bi-bullseye"></i> Objetivos e Hábitos
                    </h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Objetivo Principal</label>
                            <select class="form-select" th:field="*{objetivoPrincipal}">
                                <option value="Emagrecimento">Emagrecimento</option>
                                <option value="Hipertrofia">Ganho de Massa Muscular (Hipertrofia)</option>
                                <option value="Condicionamento">Condicionamento Físico</option>
                                <option value="Saude">Melhoria de Saúde Geral</option>
                                <option value="Competicao">Preparação para Competição</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Nível de Atividade Física Atual</label>
                            <select class="form-select" th:field="*{frequenciaAtividadeFisica}">
                                <option value="Sedentario">Sedentário (Não pratica exercícios)</option>
                                <option value="Leve">Leve (1-2x na semana)</option>
                                <option value="Moderado">Moderado (3-4x na semana)</option>
                                <option value="Intenso">Intenso (5x ou mais na semana)</option>
                            </select>
                        </div>

                        <div class="col-md-6 d-flex align-items-center gap-4 mt-5">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="fuma" th:field="*{fuma}">
                                <label class="form-check-label" for="fuma">Fumante</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="bebe" th:field="*{bebeAlcool}">
                                <label class="form-check-label" for="bebe">Consome Álcool</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Observações Gerais do Treinador</label>
                            <textarea class="form-control" rows="3" th:field="*{observacoesGerais}"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-save"></i> Salvar Anamnese
                </button>
            </div>

        </form>
    </main>

    <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
