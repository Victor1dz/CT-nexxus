<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Alunos - CT Nexxus')}"></head>

<body>

  <div th:replace="~{layout :: sidebar('alunos')}"></div>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-bold mb-0">Gerenciar Alunos</h1>
      <a th:href="@{/alunos/novo}" class="btn btn-primary"><i class="bi bi-person-plus-fill"></i> Novo Aluno</a>
    </div>

    <div class="card shadow-sm overflow-hidden">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="bg-light">
              <tr>
                <th class="ps-4">Nome</th>
                <th>Modalidades</th>
                <th>Contato</th>
                <th>Anamnese</th>
                <th>Status</th>
                <th class="text-end pe-4">Ações</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="a : ${alunos}">
                <td class="ps-4">
                  <div class="d-flex align-items-center">
                    <div
                      class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3"
                      style="width: 40px; height: 40px;">
                      <span th:text="${#strings.substring(a.nome,0,1)}" class="fw-bold"></span>
                    </div>
                    <div>
                      <h6 class="mb-0 fw-bold" th:text="${a.nome}"></h6>
                      <small class="text-muted" th:text="${#temporals.format(a.dataCadastro, 'dd/MM/yyyy')}"></small>
                    </div>
                  </div>
                </td>
                <td>
                  <!-- Se tiver matrículas, lista as modalidades -->
                  <div th:if="${not #lists.isEmpty(a.matriculas)}">
                    <span th:each="m : ${a.matriculas}" class="badge bg-primary me-1"
                      th:text="${m.modalidade.nome}"></span>
                  </div>
                  <div th:if="${#lists.isEmpty(a.matriculas)}">
                    <span class="text-muted small">-</span>
                  </div>
                </td>
                <td th:text="${a.telefone}"></td>
                <td>
                  <a th:href="@{/anamneses/aluno/{id}(id=${a.id})}" class="btn btn-sm btn-outline-info">
                    <i class="bi bi-clipboard2-pulse"></i> Ficha
                  </a>
                </td>
                <td>
                  <span th:if="${a.ativo}" class="badge bg-success bg-opacity-10 text-success">Ativo</span>
                  <span th:unless="${a.ativo}" class="badge bg-danger bg-opacity-10 text-danger">Inativo</span>
                </td>
                <td class="text-end pe-4">
                  <div class="btn-group">
                    <a th:href="@{/fichas/aluno/{id}(id=${a.id})}" class="btn btn-sm btn-warning text-white"
                      title="Treinos Inteligentes">
                      <i class="bi bi-lightning-charge-fill"></i>
                    </a>
                    <a th:href="@{/alunos/editar/{id}(id=${a.id})}" class="btn btn-sm btn-light border" title="Editar">
                      <i class="bi bi-pencil"></i>
                    </a>
                    <!-- Futuro: Botão Financeiro -->
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div th:if="${#lists.isEmpty(alunos)}" class="p-5 text-center text-muted">
          <i class="bi bi-people d-block fs-1 mb-3"></i>
          <p>Nenhum aluno cadastrado ainda.</p>
          <a href="/alunos/novo" class="btn btn-outline-primary btn-sm">Cadastrar Primeiro Aluno</a>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
