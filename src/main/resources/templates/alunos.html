<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Alunos - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">👥 Alunos</h1>

<a class="btn btn-primary mb-3" th:href="@{/alunos/novo}">Novo Aluno</a>

<table class="table table-striped">
  <thead>
  <tr>
    <th>Nome</th>
    <th>Telefone</th>
    <th>Modalidade</th>
    <th>Horário</th>
    <th>Status</th>
    <th></th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="a : ${alunos}">
    <td th:text="${a.nome}"></td>
    <td th:text="${a.telefone}"></td>
    <td th:text="${a.modalidade != null ? a.modalidade.nome : '-'}"></td>
    <td th:text="${a.horario != null ? (a.horario.diaSemana + ' ' + a.horario.horaInicio) : '-'}"></td>
    <td th:text="${a.ativo ? 'Ativo' : 'Inativo'}"></td>
    <td>
      <a th:href="@{/alunos/editar/{id}(id=${a.id})}" class="btn btn-sm btn-secondary">Editar</a>
    </td>
  </tr>
  </tbody>
</table>

<a href="/dashboard">⬅ Voltar</a>

</body>
</html>
