<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CT Nexxus</title>
  <!-- Bootstrap 5 & Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Animate.css for entrance animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      overflow: hidden;
    }

    .login-card {
      display: flex;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      width: 900px;
      max-width: 90%;
      height: 550px;
    }

    .login-image {
      flex: 1;
      background: url('/img/login-bg.jpg') no-repeat center center;
      /* Ensure this image exists or use a colorful gradient fallback */
      background-size: cover;
      background-color: #2c3e50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 40px;
      position: relative;
    }

    .login-image::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(44, 62, 80, 0.7);
      /* Overlay */
    }

    .login-text {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .login-form-container {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-control {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      background: #f8f9fa;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #3498db;
      background: #fff;
    }

    .btn-login {
      background: #3498db;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s;
    }

    .btn-login:hover {
      background: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
    }

    .logo-small {
      width: 60px;
      height: 60px;
      margin-bottom: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="login-card animate__animated animate__fadeInUp">
    <div class="login-image">
      <div class="login-text">
        <h2 class="fw-bold mb-3">Bem-vindo de volta!</h2>
        <p class="opacity-75">Sistema de Gestão Inteegrada<br>CT Nexxus</p>
      </div>
    </div>

    <div class="login-form-container">
      <div class="text-center mb-4">
        <!-- Validar se existe logo, senão usar icone -->
        <img src="/img/logo.svg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2964/2964514.png'"
          class="logo-small" alt="Logo">
        <h3 class="fw-bold text-secondary">Login</h3>
      </div>

      <form th:action="@{/login}" method="post">
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
          Usuário ou senha inválidos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
          Logout realizado com sucesso.
        </div>

        <div class="mb-3">
          <label class="form-label text-muted small fw-bold">USUÁRIO</label>
          <input type="text" name="username" class="form-control" placeholder="Digite seu usuário..." required
            autofocus>
        </div>

        <div class="mb-4">
          <label class="form-label text-muted small fw-bold">SENHA</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-login mb-3">ENTRAR</button>
      </form>

      <div class="text-center mb-3">
        <span class="text-muted small">OU</span>
      </div>

      <a href="/oauth2/authorization/google"
        class="btn btn-light border w-100 py-2 d-flex align-items-center justify-content-center gap-2"
        style="font-weight: 500;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20">
        Entrar com Google
      </a>

      <div class="text-center mt-4 text-muted small">
        &copy; 2026 CT Nexxus - v1.0
      </div>
    </div>
  </div>

</body>

</html>
