<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CT Nexxus - Login</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm" style="max-width: 420px; width: 100%;">
      <div class="card-body p-4">
        <h1 class="h4 mb-1">CT Nexxus</h1>
        <p class="text-muted mb-4">Acesso do administrador</p>

        <div th:if="${param.error}" class="alert alert-danger py-2">Usuário ou senha inválidos.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2">Você saiu do sistema.</div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input class="form-control" name="username" autocomplete="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input class="form-control" type="password" name="password" autocomplete="current-password" required>
          </div>

          <button class="btn btn-primary w-100" type="submit">Entrar</button>

          <div class="small text-muted mt-3">
            Padrão inicial: <b>admin</b> / <b>admin123</b>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
