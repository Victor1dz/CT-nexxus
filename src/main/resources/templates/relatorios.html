<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Relatórios - CT Nexxus')}"></head>

<body>
    <div th:replace="~{layout :: sidebar('financeiro')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 fw-bold">Relatórios Financeiros</h1>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="card-title mb-0">Receita por Modalidade</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="receitaChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="card-title mb-0">Alunos por Modalidade</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="alunosChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-12">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">Frequência por Dia da Semana (Dias Mais Movimentados)</h5>
                </div>
                <div class="card-body">
                    <canvas id="frequenciaChart" height="100"></canvas>
                </div>
            </div>
        </div>
        </div>
    </main>

    <div th:replace="~{layout :: scripts}"></div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        // Receita
        const receitaLabels = /*[[${receitaLabels}]]*/[];
        const receitaData = /*[[${receitaData}]]*/[];

        const ctx = document.getElementById('receitaChart');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: receitaLabels,
                datasets: [{
                    label: 'Receita (R$)',
                    data: receitaData,
                    backgroundColor: ['#2c3e50', '#3498db', '#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6'],
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // Alunos por Modalidade
        const alunosLabels = /*[[${alunosLabels}]]*/[];
        const alunosData = /*[[${alunosData}]]*/[];

        const ctx2 = document.getElementById('alunosChart');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: alunosLabels,
                datasets: [{
                    label: 'Alunos Ativos',
                    data: alunosData,
                    backgroundColor: '#3498db',
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });

        // Frequência
        const diasLabels = /*[[${diasLabels}]]*/[];
        const diasData = /*[[${diasData}]]*/[];

        const ctx3 = document.getElementById('frequenciaChart');
        new Chart(ctx3, {
            type: 'line',
            data: {
                labels: diasLabels,
                datasets: [{
                    label: 'Presenças Confirmadas',
                    data: diasData,
                    borderColor: '#e74c3c',
                    backgroundColor: 'rgba(231, 76, 60, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    </script>
</body>

</html>
