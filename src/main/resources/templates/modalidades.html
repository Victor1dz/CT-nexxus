<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Modalidades - CT Nexxus')}"></head>

<body>

  <div th:replace="~{layout :: sidebar('modalidades')}"></div>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-bold mb-0">Modalidades</h1>
      <a th:href="@{/modalidades/nova}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Nova Modalidade</a>
    </div>

    <div class="card p-0 overflow-hidden">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="m : ${modalidades}">
            <td class="fw-bold" th:text="${m.nome}"></td>
            <td th:text="${m.descricao}"></td>
            <td>
              <span th:if="${m.ativa}" class="badge bg-success">Ativa</span>
              <span th:unless="${m.ativa}" class="badge bg-secondary">Inativa</span>
              <span th:if="${m.exigeHorario}" class="badge bg-warning text-dark"><i class="bi bi-clock"></i> A
                Combinar</span>
            </td>
            <td>
              <a th:href="@{/precos/modalidade/{id}(id=${m.id})}" class="btn btn-sm btn-outline-info me-1"
                title="Gerenciar Preços">
                <i class="bi bi-currency-dollar"></i> Preços
              </a>
              <a th:href="@{/modalidades/editar/{id}(id=${m.id})}" class="btn btn-sm btn-outline-secondary"
                title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:if="${#lists.isEmpty(modalidades)}" class="p-4 text-center text-muted">
        Nenhuma modalidade cadastrada.
      </div>
    </div>
  </main>

  <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
