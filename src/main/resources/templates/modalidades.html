<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Modalidades - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">🏋️ Modalidades</h1>

<a class="btn btn-primary mb-3" th:href="@{/modalidades/nova}">Nova Modalidade</a>

<table class="table table-striped">
  <thead>
  <tr>
    <th>Nome</th>
    <th>Valor mensal</th>
    <th>Status</th>
    <th></th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="m : ${modalidades}">
    <td th:text="${m.nome}"></td>
    <td th:text="${m.valorMensal}"></td>
    <td th:text="${m.ativa ? 'Ativa' : 'Inativa'}"></td>
    <td>
      <a th:href="@{/modalidades/editar/{id}(id=${m.id})}" class="btn btn-sm btn-secondary">Editar</a>
    </td>
  </tr>
  </tbody>
</table>

<a href="/dashboard">⬅ Voltar</a>

</body>
</html>
