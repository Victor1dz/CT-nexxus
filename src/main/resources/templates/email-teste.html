<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teste de E-mail - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">✉️ Testar envio de e-mail</h1>

<div th:if="${enviado}" class="alert alert-success">
  E-mail enviado com sucesso ✅
</div>

<div th:if="${erro != null}" class="alert alert-danger">
  Erro ao enviar: <span th:text="${erro}"></span>
</div>

<form method="post" action="/email-teste/enviar" class="card p-3">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

  <div class="mb-3">
    <label class="form-label">Enviar para</label>
    <input class="form-control" type="email" name="para" required placeholder="seuemail@dominio.com">
  </div>

  <div class="d-flex gap-2">
    <button class="btn btn-primary" type="submit">Enviar teste agora</button>
    <a class="btn btn-secondary" href="/financeiro">Voltar</a>
    <a class="btn btn-outline-secondary" href="/dashboard">Dashboard</a>
  </div>
</form>

</body>
</html>
