<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Teste de Envio - CT Nexxus')}"></head>

<body>

  <div th:replace="~{layout :: sidebar('financeiro')}"></div>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-bold mb-0">Teste de Email</h1>
      <a href="/financeiro" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <div class="col-md-6 mx-auto">
      <div class="card p-4 shadow-sm border-0">
        <h5 class="card-title fw-bold mb-3"><i class="bi bi-envelope-check"></i> Verificar Configuração SMTP</h5>
        <div th:if="${enviado}" class="alert alert-success d-flex align-items-center">
          <i class="bi bi-check-circle-fill me-2 fs-4"></i>
          <div>Email enviado com sucesso! Verifique sua caixa de entrada.</div>
        </div>

        <div th:if="${erro != null}" class="alert alert-danger">
          <h6 class="fw-bold"><i class="bi bi-x-circle"></i> Falha no envio</h6>
          <span th:text="${erro}"></span>
        </div>

        <form method="post" action="/email-teste/enviar">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div class="mb-3">
            <label class="form-label fw-bold">Email de Destino</label>
            <input class="form-control" type="email" name="para" placeholder="exemplo@gmail.com" required>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            <i class="bi bi-send"></i> Enviar Teste
          </button>
        </form>
      </div>
    </div>
  </main>

  <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
