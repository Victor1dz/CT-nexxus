<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Horários - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">🕒 Horários</h1>

<a class="btn btn-primary mb-3" th:href="@{/horarios/novo}">Novo Horário</a>

<table class="table table-striped">
  <thead>
  <tr>
    <th>Dia</th>
    <th>Início</th>
    <th>Fim</th>
    <th>Modalidade</th>
    <th>Status</th>
    <th></th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="h : ${horarios}">
    <td th:text="${h.diaSemana}"></td>
    <td th:text="${h.horaInicio}"></td>
    <td th:text="${h.horaFim}"></td>
    <td th:text="${h.modalidade != null ? h.modalidade.nome : '-'}"></td>
    <td th:text="${h.ativo ? 'Ativo' : 'Inativo'}"></td>
    <td>
      <a th:href="@{/horarios/editar/{id}(id=${h.id})}" class="btn btn-sm btn-secondary">Editar</a>
    </td>
  </tr>
  </tbody>
</table>

<a href="/dashboard">⬅ Voltar</a>

</body>
</html>
