<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inadimplência - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">🧾 Inadimplência</h1>

<div class="mb-3 d-flex gap-2">
  <a class="btn btn-primary" href="/financeiro">Voltar ao Financeiro</a>
  <a class="btn btn-secondary" href="/dashboard">Dashboard</a>
</div>

<div class="table-responsive">
  <table class="table table-striped align-middle">
    <thead>
    <tr>
      <th>Aluno</th>
      <th>E-mail</th>
      <th>Competência</th>
      <th>Vencimento</th>
      <th>Valor</th>
      <th>Dias em atraso</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${inadimplentes}">
      <td th:text="${m.aluno != null ? m.aluno.nome : '-'}"></td>
      <td th:text="${m.aluno != null ? m.aluno.email : '-'}"></td>
      <td th:text="${m.competencia}"></td>
      <td th:text="${m.vencimento}"></td>
      <td th:text="${'R$ ' + m.valor}"></td>
      <td th:text="${m.vencimento != null ? T(java.time.temporal.ChronoUnit).DAYS.between(m.vencimento, hoje) : '-'}"></td>
    </tr>
    </tbody>
  </table>
</div>

<div class="alert alert-secondary mt-3">
  Lembretes por e-mail são enviados automaticamente em D-2, D-1 e D0 (se houver e-mail cadastrado e se ainda estiver pendente).
</div>

</body>
</html>
