<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Inadimplência - CT Nexxus')}"></head>

<body>

  <div th:replace="~{layout :: sidebar('financeiro')}"></div>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h4 fw-bold mb-0 text-danger">Relatório de Inadimplência</h1>
        <p class="text-muted mb-0">Alunos com mensalidades vencidas</p>
      </div>
      <a href="/financeiro" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <div class="card p-0 overflow-hidden shadow-sm border-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="bg-danger text-white">
            <tr>
              <th>Aluno</th>
              <th>Competência</th>
              <th>Vencimento</th>
              <th>Valor</th>
              <th>Telefone</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="m : ${inadimplentes}">
              <td class="fw-bold" th:text="${m.aluno != null ? m.aluno.nome : '-'}"></td>
              <td th:text="${m.competencia}"></td>
              <td class="fw-bold text-danger" th:text="${#temporals.format(m.vencimento, 'dd/MM/yyyy')}"></td>
              <td th:text="${'R$ ' + m.valor}"></td>
              <td>
                <a th:if="${m.aluno != null}"
                  th:href="'https://wa.me/55' + ${#strings.replace(m.aluno.telefone, ' ', '')}" target="_blank"
                  class="btn btn-sm btn-outline-success">
                  <i class="bi bi-whatsapp"></i> Cobrar
                </a>
              </td>
              <td>
                <form method="post" action="/financeiro/pagar" class="d-flex gap-2">
                  <input type="hidden" name="id" th:value="${m.id}">
                  <input type="hidden" name="mes" th:value="${m.competencia}">
                  <input type="hidden" name="forma" value="PIX">
                  <button class="btn btn-sm btn-success" type="submit">Baixar (PIX)</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
        <div th:if="${#lists.isEmpty(inadimplentes)}" class="p-5 text-center text-muted">
          <i class="bi bi-check-circle-fill d-block fs-1 mb-3 text-success"></i>
          <p class="h5">Tudo em dia!</p>
          <p>Nenhuma mensalidade atrasada encontrada.</p>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
