<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Preços - CT Nexxus')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('modalidades')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 fw-bold mb-0">Tabela de Preços</h1>
                <p class="text-muted mb-0" th:text="${'Gerenciando preços para: ' + modalidade.nome}"></p>
            </div>
            <a th:href="@{/precos/novo(modalidadeId=${modalidade.id})}" class="btn btn-primary"><i
                    class="bi bi-plus-lg"></i> Novo Preço</a>
        </div>

        <div class="card p-0 overflow-hidden">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Frequência</th>
                        <th>Valor</th>
                        <th>Descrição</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${precos}">
                        <td>
                            <span th:switch="${p.frequenciaSemanal}">
                                <span th:case="1">1x na semana</span>
                                <span th:case="2">2x na semana</span>
                                <span th:case="3">3x na semana</span>
                                <span th:case="4">4x na semana</span>
                                <span th:case="5">5x na semana</span>
                                <span th:case="6">Todos os dias</span>
                                <span th:case="*">Outros</span>
                            </span>
                        </td>
                        <td class="fw-bold text-success" th:text="${'R$ ' + p.valor}"></td>
                        <td th:text="${p.descricao}"></td>
                        <td>
                            <a th:href="@{/precos/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:if="${#lists.isEmpty(precos)}" class="p-4 text-center text-muted">
                Nenhum preço cadastrado para esta modalidade.
            </div>
        </div>

        <div class="mt-3">
            <a href="/modalidades" class="btn btn-outline-secondary">Voltar para Modalidades</a>
        </div>
    </main>

    <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
