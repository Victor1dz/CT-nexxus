<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Fichas de Treino')}"></head>

<body>
    <div th:replace="~{layout :: sidebar('alunos')}"></div>
    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h4 fw-bold mb-0">Fichas de Treino</h1>
                <p class="text-secondary small">Aluno: <span th:text="${aluno.nome}">Nome</span></p>
            </div>
            <div>
                <form th:action="@{/fichas/gerar-ia/{id}(id=${aluno.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-primary animate__animated animate__pulse animate__infinite">
                        <i class="bi bi-cpu"></i> Gerar Ficha c/ IA
                    </button>
                </form>
                <a href="/alunos" class="btn btn-outline-secondary ms-2">Voltar</a>
            </div>
        </div>

        <div class="row g-4">
            <div th:each="ficha : ${fichas}" class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="card-title mb-0" th:text="${ficha.objetivoFicha}">Objetivo</h5>
                            <span class="badge bg-success" th:if="${ficha.ativa}">ATIVA</span>
                            <span class="badge bg-secondary" th:unless="${ficha.ativa}">ARQUIVADA</span>
                        </div>
                        <p class="text-muted small mb-2">
                            <i class="bi bi-calendar"></i> Início: <span
                                th:text="${#temporals.format(ficha.dataInicio, 'dd/MM/yyyy')}"></span>
                        </p>

                        <div class="alert alert-light border small text-muted fst-italic">
                            <i class="bi bi-robot"></i> <span th:text="${ficha.observacoesIA}">Obs da IA</span>
                        </div>

                        <a th:href="@{/fichas/detalhe/{id}(id=${ficha.id})}" class="btn btn-outline-primary w-100 mt-2">
                            Ver Treinos / Editar
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(fichas)}" class="col-12 text-center py-5 text-muted">
                <i class="bi bi-clipboard-x fs-1"></i>
                <p class="mt-2">Nenhuma ficha encontrada para este aluno.</p>
                <p>Clique em <strong>Gerar Ficha c/ IA</strong> para criar um plano mensal automático.</p>
            </div>
        </div>
    </main>
    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>
