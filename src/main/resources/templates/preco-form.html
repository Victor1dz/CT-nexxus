<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Preço - CT Nexxus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container py-4">

    <h1 class="h4 mb-3">Cadastro de Preço</h1>

    <form th:action="@{/precos/salvar}" th:object="${preco}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Modalidade</label>
            <select class="form-select" th:field="*{modalidade}" required>
                <option value="">Selecione</option>
                <option th:each="m : ${modalidades}" th:value="${m.id}" th:text="${m.nome}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Frequência Semanal</label>
            <select class="form-select" th:field="*{frequenciaSemanal}" required>
                <option value="1">1x por semana</option>
                <option value="2">2x por semana</option>
                <option value="3">3x por semana</option>
                <option value="4">4x por semana</option>
                <option value="5">5x por semana</option>
                <option value="6">Todos os dias</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Valor (R$)</label>
            <input class="form-control" th:field="*{valor}" inputmode="decimal" placeholder="ex: 120.00" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição (Opcional)</label>
            <input class="form-control" th:field="*{descricao}" placeholder="ex: Plano Promoção">
        </div>

        <button class="btn btn-success" type="submit">Salvar</button>
        <a href="/modalidades" class="btn btn-secondary">Cancelar</a>

    </form>

</body>

</html>
