<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CT Nexxus - Painel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="/dashboard">CT Nexxus</a>

    <div class="ms-auto">
      <form th:action="@{/logout}" method="post" class="d-inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn btn-outline-danger btn-sm" type="submit">Sair</button>
      </form>
    </div>
  </div>
</nav>

<main class="container py-4">
  <h1 class="h4 mb-3">Painel</h1>
  <p class="text-muted">Sistema de gestão do CT Nexxus (modo administrador).</p>

  <div class="row g-3">

    <div class="col-6 col-md-3">
      <a class="text-decoration-none" href="/alunos">
        <div class="card p-3 shadow-sm">👥 Alunos</div>
      </a>
    </div>

    <div class="col-6 col-md-3">
      <a class="text-decoration-none" href="/modalidades">
        <div class="card p-3 shadow-sm">🏋️ Modalidades</div>
      </a>
    </div>

    <div class="col-6 col-md-3">
      <a class="text-decoration-none" href="/horarios">
        <div class="card p-3 shadow-sm">🕒 Horários</div>
      </a>
    </div>

    <div class="col-6 col-md-3">
      <a class="text-decoration-none" href="/presencas">
        <div class="card p-3 shadow-sm">✅ Presença</div>
      </a>
    </div>

    <div class="col-6 col-md-3">
      <a class="text-decoration-none" href="/financeiro">
        <div class="card p-3 shadow-sm">💳 Financeiro</div>
      </a>
    </div>

    <div class="col-6 col-md-3">
      <a class="text-decoration-none" href="/inadimplencia">
        <div class="card p-3 shadow-sm">🧾 Inadimplência</div>
      </a>
    </div>

    <div class="col-6 col-md-3">
      <div class="card p-3 shadow-sm text-muted">📈 Relatórios (em breve)</div>
    </div>

    <div class="col-6 col-md-3">
      <div class="card p-3 shadow-sm text-muted">📅 Agenda (em breve)</div>
    </div>

  </div>
</main>
</body>
</html>
