<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Aluno - CT Nexxus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">Aluno</h1>

<form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post">
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label class="form-label">Nome</label>
    <input class="form-control" th:field="*{nome}" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Telefone</label>
    <input class="form-control" th:field="*{telefone}">
  </div>

  <div class="mb-3">
    <label class="form-label">E-mail (obrigatório para lembretes)</label>
    <input class="form-control" type="email" th:field="*{email}" required placeholder="ex: aluno@email.com">
  </div>

  <div class="row">
    <div class="col-6 mb-3">
      <label class="form-label">Data de início</label>
      <input class="form-control" type="date" th:field="*{dataInicio}" required>
    </div>

    <div class="col-6 mb-3">
      <label class="form-label">Dia do vencimento (1 a 31)</label>
      <input class="form-control" type="number" min="1" max="31" th:field="*{diaVencimento}" required>
      <div class="form-text">Se o mês não tiver esse dia (ex: 31), o sistema usa o último dia do mês.</div>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Valor personalizado (opcional)</label>
    <input class="form-control" th:field="*{valorPersonalizado}" placeholder="ex: 120.00">
    <div class="form-text">Se vazio, o sistema usa o valor da modalidade.</div>
  </div>

  <div class="mb-3">
    <label class="form-label">Modalidade</label>
    <select class="form-select" th:field="*{modalidade}" required>
      <option value="">Selecione</option>
      <option th:each="m : ${modalidades}" th:value="${m.id}" th:text="${m.nome}"></option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Horário</label>
    <select class="form-select" th:field="*{horario}" required>
      <option value="">Selecione</option>
      <option th:each="h : ${horarios}"
              th:value="${h.id}"
              th:text="${h.diaSemana + ' ' + h.horaInicio + ' - ' + h.horaFim}">
      </option>
    </select>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" th:field="*{ativo}">
    <label class="form-check-label">Ativo</label>
  </div>

  <button class="btn btn-success" type="submit">Salvar</button>
  <a href="/alunos" class="btn btn-secondary">Cancelar</a>
</form>

</body>
</html>
