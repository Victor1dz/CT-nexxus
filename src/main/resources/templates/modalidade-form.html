<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <title>Modalidade - CT Nexxus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h1 class="h4 mb-3">Modalidade</h1>

<form th:action="@{/modalidades/salvar}" th:object="${modalidade}" method="post">

  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label>Nome</label>
    <input class="form-control" th:field="*{nome}" required>
  </div>

  <div class="mb-3">
    <label>Valor mensal (ex: 120.00)</label>
    <input class="form-control" th:field="*{valorMensal}" inputmode="decimal" required>
  </div>

  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" th:field="*{ativa}">
    <label class="form-check-label">Ativa</label>
  </div>

  <button class="btn btn-success">Salvar</button>
  <a href="/modalidades" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
