<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Nova Modalidade - CT Nexxus')}"></head>

<body>

  <div th:replace="~{layout :: sidebar('modalidades')}"></div>

  <main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 fw-bold mb-0">Nova Modalidade</h1>
      <a href="/modalidades" class="btn btn-outline-secondary">Voltar</a>
    </div>

    <div class="card p-4">
      <form th:action="@{/modalidades/salvar}" th:object="${modalidade}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
          <label class="form-label fw-bold">Nome da Modalidade</label>
          <input class="form-control" th:field="*{nome}" required placeholder="Ex: Muay Thai">
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Descrição</label>
          <textarea class="form-control" th:field="*{descricao}" rows="3"
            placeholder="Ex: Aulas intensas focadas em..."></textarea>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" th:field="*{ativa}" checked>
          <label class="form-check-label">Modalidade Ativa</label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" th:field="*{exigeHorario}">
          <label class="form-check-label text-warning fw-bold"> <i class="bi bi-clock-history"></i> Exige Horário a
            Combinar (Ex: Personal)</label>
          <div class="form-text">Se marcado, o cadastro do aluno pedirá definição manual de dia e hora.</div>
        </div>

        <button class="btn btn-primary" type="submit">
          <i class="bi bi-check-lg"></i> Salvar
        </button>
      </form>
    </div>
  </main>

  <div th:replace="~{layout :: scripts}"></div>

</body>

</html>
