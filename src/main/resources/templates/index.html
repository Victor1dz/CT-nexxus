<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head('Dashboard - CT Nexxus')}"></head>

<body>

    <div th:replace="~{layout :: sidebar('dashboard')}"></div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="h4 fw-bold mb-1 animate__animated animate__fadeInDown">Visão Geral</h2>
                <p class="text-secondary small mb-0 animate__animated animate__fadeInDown animate__delay-1s"
                    th:text="'Resumo de ' + ${#temporals.format(mesReferencia, 'MMMM yyyy')}">Resumo do Mês</p>
            </div>
            <a href="/alunos/novo" class="btn btn-primary"><i class="bi bi-person-plus"></i> Novo Aluno</a>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <a href="/alunos" class="text-decoration-none">
                    <div class="card h-100 border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-uppercase fw-bold text-secondary small mb-1"
                                        style="font-size: 0.75rem; letter-spacing: 1px;">Alunos Ativos</p>
                                    <h2 class="fw-bold mb-0 text-dark" th:text="${totalAlunos}">0</h2>
                                </div>
                                <div class="p-3 rounded-4" style="background-color: #EFF6FF;">
                                    <i class="bi bi-people text-primary fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/financeiro" class="text-decoration-none">
                    <div class="card h-100 border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-uppercase fw-bold text-secondary small mb-1"
                                        style="font-size: 0.75rem; letter-spacing: 1px;">Receita Estimada</p>
                                    <h2 class="fw-bold mb-0 text-success"
                                        th:text="'R$ ' + ${#numbers.formatDecimal(receitaMensal, 1, 'POINT', 2, 'COMMA')}">
                                        R$ 0,00</h2>
                                </div>
                                <div class="p-3 rounded-4" style="background-color: #F0FDF4;">
                                    <i class="bi bi-cash-stack text-success fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/inadimplencia" class="text-decoration-none">
                    <div class="card h-100 border-0">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-uppercase fw-bold text-secondary small mb-1"
                                        style="font-size: 0.75rem; letter-spacing: 1px;">Inadimplentes</p>
                                    <h2 class="fw-bold mb-0 text-danger" th:text="${totalInadimplentes}">0</h2>
                                </div>
                                <div class="p-3 rounded-4" style="background-color: #FEF2F2;">
                                    <i class="bi bi-exclamation-triangle text-danger fs-3"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card border-0 mb-4">
            <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
                <h5 class="card-title fw-bold text-dark"><i class="bi bi-lightning-charge-fill text-warning me-2"></i>
                    Ações Rápidas</h5>
            </div>
            <div class="card-body p-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <a href="/agenda"
                            class="btn btn-white w-100 py-4 d-flex flex-column align-items-center gap-3 border shadow-sm text-dark h-100 zoom-effect">
                            <i class="bi bi-calendar-week fs-1 text-primary"></i>
                            <span class="fw-semibold">Agenda</span>
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="/relatorios"
                            class="btn btn-white w-100 py-4 d-flex flex-column align-items-center gap-3 border shadow-sm text-dark h-100 zoom-effect">
                            <i class="bi bi-graph-up fs-1 text-info"></i>
                            <span class="fw-semibold">Relatórios</span>
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="/financeiro"
                            class="btn btn-white w-100 py-4 d-flex flex-column align-items-center gap-3 border shadow-sm text-dark h-100 zoom-effect">
                            <i class="bi bi-cash-coin fs-1 text-success"></i>
                            <span class="fw-semibold">Financeiro</span>
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="/diario"
                            class="btn btn-white w-100 py-4 d-flex flex-column align-items-center gap-3 border shadow-sm text-dark h-100 zoom-effect">
                            <i class="bi bi-calendar-check fs-1 text-primary"></i>
                            <span class="fw-semibold">Quem Vem Hoje</span>
                        </a>
                    </div>
                </div>
                <style>
                    .zoom-effect {
                        transition: transform 0.2s ease, box-shadow 0.2s ease;
                    }

                    .zoom-effect:hover {
                        transform: translateY(-5px);
                        box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15) !important;
                    }
                </style>
            </div>
        </div>
    </main>

    <div th:replace="~{layout :: scripts}"></div>
</body>

</html>
